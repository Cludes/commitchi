name: Update Pet SVG

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'scripts/generate-pet-svg.mjs'
      - 'src/utils/sprites.js'
      - 'src/utils/petCalculations.js'
      - '.github/workflows/update-pet.yml'

permissions:
  contents: write

concurrency:
  group: update-pet
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate pet SVG
        env:
          COMMITCHI_USER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-pet-svg.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commitchi.svg
          if git diff --staged --quiet; then
            echo "No changes to pet."
          else
            git commit -m "Update pet SVG"
            git push
          fi

  # Optional: auto-embed the pet in your profile README (the <owner>/<owner> repo).
  # Requires a GitHub App with Contents: write on that repo, installed on your
  # account, with its App ID and private key stored as the CLUDESAPP_ID and
  # CLUDESAPP_PEM secrets. Without them, this job is skipped.
  profile:
    needs: update
    runs-on: ubuntu-latest
    env:
      APP_ID: ${{ secrets.CLUDESAPP_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Mint profile access token
        if: env.APP_ID != ''
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLUDESAPP_ID }}
          private-key: ${{ secrets.CLUDESAPP_PEM }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.repository_owner }}
      - name: Embed pet in profile README
        if: env.APP_ID != ''
        env:
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -e
          if ! git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/${OWNER}/${OWNER}.git" profile; then
            echo "::warning::Profile repo ${OWNER}/${OWNER} not found, or the app lacks access. Create it and install the app there."
            exit 0
          fi
          README=profile/README.md node scripts/update-profile-readme.mjs
          cd profile
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "Profile already up to date."
          else
            git commit -m "Add Commitchi pet"
            git push
          fi
