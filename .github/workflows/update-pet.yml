name: Update Pet SVG

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'scripts/generate-pet-svg.mjs'
      - 'src/utils/sprites.js'
      - 'src/utils/petCalculations.js'
      - '.github/workflows/update-pet.yml'

permissions:
  contents: write

concurrency:
  group: update-pet
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate pet SVG
        env:
          COMMITCHI_USER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-pet-svg.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commitchi.svg
          if git diff --staged --quiet; then
            echo "No changes to pet."
          else
            git commit -m "Update pet SVG"
            git push
          fi

  # Optional: auto-embed the pet in your profile README (the <owner>/<owner> repo).
  # Requires a Personal Access Token with write access to that repo, stored as the
  # PROFILE_TOKEN secret. Without it, this job is skipped.
  profile:
    needs: update
    runs-on: ubuntu-latest
    env:
      PROFILE_TOKEN: ${{ secrets.PROFILE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Embed pet in profile README
        if: env.PROFILE_TOKEN != ''
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          set -e
          if ! git clone --depth 1 "https://x-access-token:${PROFILE_TOKEN}@github.com/${OWNER}/${OWNER}.git" profile; then
            echo "::warning::Profile repo ${OWNER}/${OWNER} not found. Create it to enable auto-embed."
            exit 0
          fi
          README=profile/README.md node scripts/update-profile-readme.mjs
          cd profile
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "Profile already up to date."
          else
            git commit -m "Add Commitchi pet"
            git push
          fi
